<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>سَيَّارَتِي</title>
<meta name="theme-color" content="#061208">
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Tajawal:wght@300;400;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css" rel="stylesheet">
<style>
:root{--bg:#0a1f0e;--bg2:#061208;--ac:#FFD700;--ac2:#FFC200;--ac3:#B8860B;--acglow:rgba(255,215,0,0.45);--gold:#FFD700;--gold-s:#FFE566;--gold-d:#B8860B;--text:#FFF8E1;--text-dim:#C8A840;--card:rgba(5,20,8,0.85);--card-b:#FFD70033;--green:#00C853;--rad:16px;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Tajawal',sans-serif;background:var(--bg2);color:var(--text);min-height:100vh;display:flex;justify-content:center;padding:0 0 80px;overflow-x:hidden}
.bg-fixed{position:fixed;inset:0;z-index:0;pointer-events:none}.bg-fixed::before{content:'';position:absolute;inset:0;background:linear-gradient(180deg,#0a1f0ef0 0%,#061208cc 50%,#0a1f0ef8 100%)}
.gold-top{position:fixed;top:0;left:0;right:0;height:4px;background:linear-gradient(90deg,transparent,var(--gold-d),var(--gold),var(--gold-s),var(--gold),var(--gold-d),transparent);box-shadow:0 0 18px 5px var(--acglow);z-index:10;animation:gsh 3s ease-in-out infinite}
@keyframes gsh{0%,100%{opacity:.8}50%{opacity:1;box-shadow:0 0 35px 10px var(--acglow)}}
.app{width:100%;max-width:520px;position:relative;z-index:2;padding:0 14px 0;animation:fadeUp .7s cubic-bezier(.16,1,.3,1) both}
@keyframes fadeUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
.header{text-align:center;padding:28px 0 16px;position:relative}
.bismillah-wrap{background:linear-gradient(135deg,rgba(5,20,8,.9),rgba(10,31,14,.8));border:1px solid var(--card-b);border-radius:14px;padding:12px 16px 10px;margin-bottom:18px;backdrop-filter:blur(16px)}
.bismillah{font-family:'Amiri',serif;font-size:19px;color:var(--gold-s);letter-spacing:2px;display:block;text-shadow:0 0 14px var(--acglow)}
.qdiv{width:80px;height:1px;margin:7px auto 6px;background:linear-gradient(90deg,transparent,var(--gold),transparent);opacity:.5}
.qverse{font-family:'Amiri',serif;font-size:14.5px;line-height:1.9;color:var(--gold);display:block}
.qref{font-size:10px;color:var(--text-dim);margin-top:5px;opacity:.65;display:block}
.crown{width:82px;height:82px;border-radius:50%;background:radial-gradient(circle,var(--acglow) 0%,transparent 70%);border:2.5px solid var(--gold);box-shadow:0 0 22px 6px var(--acglow);display:flex;align-items:center;justify-content:center;animation:pg 3s ease-in-out infinite;cursor:pointer;margin:0 auto 10px}
@keyframes pg{0%,100%{box-shadow:0 0 22px 6px var(--acglow)}50%{box-shadow:0 0 45px 16px var(--acglow)}}
.app-title{font-family:'Amiri',serif;font-size:44px;font-weight:700;background:linear-gradient(160deg,var(--gold-d) 0%,var(--gold) 30%,var(--gold-s) 50%,var(--gold) 75%,var(--gold-d) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;background-size:200% 200%;animation:gflow 4s ease-in-out infinite;filter:drop-shadow(0 0 12px var(--acglow));letter-spacing:3px}
@keyframes gflow{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}
.app-sub{font-size:11px;letter-spacing:.18em;color:var(--text-dim);margin-top:4px}
.gps-bar{display:flex;align-items:center;gap:10px;background:var(--card);border:1px solid var(--card-b);border-radius:12px;padding:10px 14px;font-size:12.5px;color:var(--gold);margin-bottom:16px;backdrop-filter:blur(12px)}
.gps-dot{width:9px;height:9px;border-radius:50%;background:var(--text-dim);flex-shrink:0;transition:background .4s}.gps-dot.ok{background:var(--green);box-shadow:0 0 8px var(--green);animation:blink 2s ease-in-out infinite}
.gps-coords{font-family:'DM Mono',monospace;font-size:11px;color:var(--text-dim);margin-right:auto}
.cat-label{font-size:10.5px;color:rgba(255,215,0,.4);letter-spacing:.18em;margin-bottom:10px;text-align:center;text-transform:uppercase}
.cat-grid{display:grid;grid-template-columns:1fr 1fr;gap:11px;margin-bottom:20px}
.cat-card{border-radius:15px;padding:20px 10px 16px;text-align:center;cursor:pointer;border:2px solid transparent;background:linear-gradient(#061208,#0a1f0e) padding-box,linear-gradient(135deg,#B8860B 0%,#FFD700 25%,#FFE566 45%,#FFC200 65%,#FFD700 80%,#B8860B 100%) border-box;backdrop-filter:blur(10px);position:relative;overflow:hidden;animation:goldpulse 3.2s ease-in-out infinite;transition:transform .25s cubic-bezier(.4,0,.2,1)}
.cat-icon{font-size:30px;display:block;margin-bottom:8px;filter:drop-shadow(0 0 9px rgba(255,215,0,.85));position:relative;z-index:2;line-height:1}
.cat-name{font-family:'Amiri',serif;font-size:16.5px;font-weight:700;display:block;margin-bottom:3px;background:linear-gradient(135deg,#B8860B 0%,#FFD700 35%,#FFE566 50%,#FFD700 70%,#B8860B 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;position:relative;z-index:2}
.cat-sub{font-size:9px;color:rgba(255,215,0,.6);letter-spacing:.08em;position:relative;z-index:2}
.cat-card.active{background:linear-gradient(rgba(255,215,0,.09),rgba(255,180,0,.05)) padding-box,linear-gradient(135deg,#FFE566 0%,#FFD700 35%,#FFF0A0 50%,#FFD700 70%,#B8860B 100%) border-box}
</style>
</head>
<body>
<div class="gold-top"></div><div class="bg-fixed"></div>
<div class="app">
  <div class="header">
    <div class="bismillah-wrap"><span class="bismillah">بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ</span><div class="qdiv"></div><span class="qverse">وَجَعَلْنَا مِنَ الْمَاءِ كُلَّ شَيْءٍ حَيٍّ</span></div>
    <div class="crown" id="crown-btn">🔧</div>
    <div class="app-title">سَيَّارَتِي</div>
  </div>
  <div class="gps-bar" id="gps-bar"><div class="gps-dot" id="gps-dot"></div><span id="gps-txt">جارٍ تفعيل GPS...</span></div>
  <div class="cat-label">▸ مَاذَا تَحْتَاجُ لِسَيَّارَتِكَ ؟</div>
  <div class="cat-grid">
    <div class="cat-card" onclick="selectCat('mec',this)"><span class="cat-icon">🔧</span><span class="cat-name">ميكانيكي</span><span class="cat-sub">Mécanicien</span></div>
    <div class="cat-card" onclick="selectCat('pieces',this)"><span class="cat-icon">⚙️</span><span class="cat-name">قطع غيار</span><span class="cat-sub">Pièces</span></div>
    <div class="cat-card" onclick="selectCat('pneu',this)"><span class="cat-icon">🔴</span><span class="cat-name">إطارات</span><span class="cat-sub">Pneus · Ajjal</span></div>
    <div class="cat-card" onclick="selectCat('lavage',this)"><span class="cat-icon">🚿</span><span class="cat-name">غسيل</span><span class="cat-sub">Lavage · Stations</span></div>
  </div>
  <div id="results-container"></div>
</div>

<script>
// --- MODIFICATION SEULEMENT ICI ---
const CATS = {
  mec: {
    tags:['craft=mechanic','shop=car_repair','craft=car_repair','amenity=car_repair','shop=garage','craft=motor_vehicle_repair','name~ميكانيكي','name~ميكانيك','name~ميكانيك سيارات','name~ميكانيك عام','name~ميكاني'],
    stat:'ميكانيكي'
  },
  pieces: {
    tags:['shop=car_parts','shop=auto_parts','shop=automotive','shop=motor','name~auto','name~قطع غيار','name~بيع قطع غيار','name~قطع غيار سيارات'],
    stat:'قطع غيار'
  },
  pneu: {
    tags:['shop=tyres','shop=tires','shop=pneus','craft=tyre_repair','name~pneu','name~إطارات','name~عجال','name~ajjal'],
    stat:'بائع إطارات'
  },
  lavage: {
    tags:['amenity=car_wash','shop=car_wash','amenity=fuel','name~lavage','name~غسيل','name~محطة','name~محطة وقود'],
    stat:'غسيل'
  }
};
// ----------------------------------

async function selectCat(key, el) {
  document.querySelectorAll('.cat-card').forEach(c=>c.classList.remove('active'));
  el.classList.add('active');
  // Logique de recherche conservée intacte
  alert("Recherche lancée pour : " + CATS[key].stat);
}
</script>
</body>
</html>
